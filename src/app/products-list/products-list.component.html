<mat-card>
    <mat-card-content>
        <mat-card id="products" class="mt-3">
            <mat-card-header>
                <!-- <mat-card-subtitle>Products</mat-card-subtitle> -->
            </mat-card-header>
            <mat-card-content>
           
                <div class="row align-items-center mb-4 ">
                    <div class="col-6 col-xs-6 col-md-4 col-lg-3">
                        <input type="number" [(ngModel)]="Limit" class="form-control" placeholder="Enter limit to View"
                            (input)="onLimitChange()" />
                    </div>
                    <div class=" col-6 col-xs-6 col-md-4 col-lg-3 ">
                        <select class="form-select" id="sortBySelect" (change)="shortByEvent($event)"> 
                            <option value="desc">What's New</option>
                            <option value="asc" selected>Relevance</option>
                        </select>
                    </div>
                </div>
                <!-- Products container -->
                    <div class="Products-container">
                        <div class="Products-card" *ngFor="let prod of displayedProducts; let i = index"
                            [ngClass]="{'show': i < ProdCards}" (click)="viewProductDetails(prod.id)">
                            <img mat-card-image [src]="prod.image" alt="Product image {{ i + 1 }}" />
                            <p class="product-title">{{ prod.title }}</p>
                        </div>
                    </div>
            </mat-card-content>
        </mat-card>
    </mat-card-content>
    <mat-card-footer></mat-card-footer>
</mat-card>
