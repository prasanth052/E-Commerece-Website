<mat-toolbar class="navbar">
  <p class="navbar-title">TECH VEGAS</p>
  <div class="navbar-links">
    <a href="#about" mat-button>About</a>
    <a href="#vision" mat-button>Vision & Mission</a>
    <a href="#products" mat-button>Products</a>
    <a href="#clients" mat-button>Clients</a>
  </div>
  <div class="user-cart">
    <a href="#profile" mat-icon-button>
      <mat-icon>account_circle</mat-icon>
    </a>
    <a href="#cart" mat-icon-button>
      <mat-icon>shopping_cart</mat-icon>
    </a>
  </div>
</mat-toolbar>

<mat-sidenav-container class="example-container" autosize>
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      <a mat-list-item href="javascript:void(0)" (click)="toggleCategoryMenu()">
        <i class="fa-solid fa-user-group"></i> Category
        <mat-icon class="menu-button float-end" [ngClass]="{'rotated': showCategoryMenu}">expand_more</mat-icon>
      </a>
      <div class="submenu" [ngClass]="{'show': showCategoryMenu}">
        <a *ngFor="let item of catg" mat-list-item class="submenuitem" (click)="seletecedCatg(item.name)">
          {{ item.name }}
        </a>

      </div>
    </mat-nav-list>
    <mat-nav-list>
      <a mat-list-item href="javascript:void(0)" (click)="toggleFilterMenu()">
        <i class="fa-solid fa-filter"></i> Filter
        <mat-icon class="menu-button float-end" [ngClass]="{'rotated': showFilterMenu}">expand_more</mat-icon>
      </a>
      <div class="submenu" [ngClass]="{'show': showFilterMenu}">
        <!-- <mat-slider min="0" max="100000" step="1000" showTickMarks discrete [displayWith]="formatLabel">
          <input matSliderThumb>
        </mat-slider> -->

      </div>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <app-products-list ></app-products-list>
  </mat-sidenav-content>
</mat-sidenav-container>
